<dialog class="modal" [class.modal-open]="isOpen">
  <div class="modal-box bg-[#161B22] border border-[#30363d] p-0 overflow-hidden flex flex-col max-h-[80vh] max-w-sm shadow-2xl">
      
      <div class="p-4 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117]">
          <h3 class="text-lg font-medium text-white">Salvar em...</h3>
          <button type="button" (click)="close()" class="text-gray-400 hover:text-white transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
          </button>
      </div>
      
      <div class="flex-1 overflow-y-auto p-4 scrollbar-thin scrollbar-thumb-gray-700">
          <div class="flex flex-col gap-2">
              @if (isLoading()) {
                <div class="text-center text-sm text-gray-500 py-4">Carregando coleções...</div>
              } @else {
                @for (collection of collections(); track collection.collectionId) {
                <button type="button" (click)="addToCollection(collection.collectionId)"
                    class="w-full text-left px-4 py-3 rounded-lg border border-[#30363d] bg-[#0d1117] hover:border-emerald-500 hover:bg-emerald-600/10 transition-colors flex items-center justify-between group">
                    <span class="text-sm text-gray-300 font-medium group-hover:text-emerald-400">{{ collection.name }}</span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 text-gray-500 group-hover:text-emerald-400">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                </button>
                } @empty {
                <div class="text-center text-sm text-gray-500 py-4">Você ainda não tem nenhuma coleção.</div>
                }
              }
          </div>
      </div>

      <div class="p-4 border-t border-[#30363d] bg-[#0d1117]">
          <form [formGroup]="newCollectionForm" (ngSubmit)="createCollection()" class="flex gap-2">
              <input type="text" formControlName="name" placeholder="Nova coleção..."
                  class="flex-1 rounded-lg border border-[#30363d] bg-[#161B22] px-3 py-2 text-sm text-white placeholder:text-gray-500 focus:border-emerald-500 focus:outline-none" />
              <button type="submit" [disabled]="newCollectionForm.invalid || isCreating()"
                  class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition-all hover:bg-emerald-500 disabled:opacity-50">
                  Criar
              </button>
          </form>
      </div>
  </div>
  
  <form method="dialog" class="modal-backdrop" (click)="close()">
      <button>close</button>
  </form>
</dialog>
