<div class="mt-4 pl-4 border-l-2 border-[#30363d] space-y-4">
    <!-- Lista de Comentários -->
    @for (comment of comments(); track comment.commentId) {
    <div class="flex flex-col gap-1 text-sm border-b border-[#30363d] pb-3 last:border-0 last:pb-0">
        <div class="flex items-center gap-2">
            <span class="font-bold text-gray-300">{{ comment.profile.name }}</span>
            <span class="text-xs text-gray-500">{{ comment.createdAt | date:'short' }}</span>
        </div>
        <p class="text-gray-400">
            {{ comment.content }}
        </p>
        <button type="button" (click)="replyTo(comment.profile.name)" class="text-xs text-emerald-500 hover:text-emerald-400 self-start mt-1 font-medium transition-colors">
            Responder
        </button>
    </div>
    }

    <!-- Input de Comentário -->
    <div class="pt-2">
        <form [formGroup]="commentForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-2">
            <textarea #commentInput formControlName="content" rows="2" placeholder="Adicione um comentário..."
                class="w-full rounded-lg border border-[#30363d] bg-[#0d1117] px-3 py-2 text-sm text-white placeholder:text-gray-500 focus:border-emerald-500 focus:outline-none resize-none"></textarea>
            <div class="flex justify-end">
                <button type="submit" [disabled]="commentForm.invalid || isSubmiting()"
                    class="rounded-lg bg-[#21262d] border border-[#30363d] px-4 py-1.5 text-xs font-medium text-white hover:bg-[#30363d] transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    @if (isSubmiting()) {
                    Enviando...
                    } @else {
                    Comentar
                    }
                </button>
            </div>
        </form>
    </div>
</div>
