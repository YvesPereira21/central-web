<div class="space-y-2">
    <label class="text-sm font-medium text-gray-400">Tags (selecione as tecnologias)</label>
    <div>
        <button type="button" (click)="openTagModal()"
            class="inline-flex items-center gap-2 rounded-lg bg-[#0d1117] border border-[#30363d] px-4 py-2 text-sm font-medium text-gray-300 hover:border-gray-500 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            Adicionar Tags
        </button>
    </div>

    <!-- Selected Tags Preview -->
    <div class="flex flex-wrap gap-1">
        @for (control of technologyNames.controls; track control.value) {
        <span
            class="px-3 py-1 mb-2 rounded-full border border-emerald-500 bg-emerald-600/20 text-emerald-400 text-xs font-bold flex items-center gap-1">
            #{{ control.value }}
            <button type="button" (click)="toggleTag(control.value)" class="hover:text-emerald-200 focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-3">
                    <path
                        d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
                </svg>
            </button>
        </span>
        }
    </div>
</div>

<dialog class="modal" [class.modal-open]="isTagModalOpen()">
    <div
        class="modal-box bg-[#161B22] border border-[#30363d] p-0 overflow-hidden flex flex-col max-h-[80vh] max-w-md shadow-2xl">

        <button type="button" class="p-4 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117]">
            <h3 class="text-lg font-medium text-white">Selecionar Tags</h3>
        </button>

        <div class="p-4 border-b border-[#30363d]">
            <div class="relative">
                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-4 text-gray-500">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                    </svg>
                </div>
                <input type="text" [value]="searchTagQuery()" (input)="updateSearchQuery($event)"
                    placeholder="Pesquisar tag..."
                    class="w-full rounded-lg border border-[#30363d] bg-[#0d1117] py-2 pl-10 pr-4 text-sm text-white placeholder:text-gray-500 focus:border-emerald-500 focus:outline-none" />
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 scrollbar-thin scrollbar-thumb-gray-700">
            <div class="flex flex-wrap gap-2">
                @for (tag of filteredTags(); track tag.technologyName) {
                <button type="button" (click)="toggleTag(tag.technologyName)" [class]="isTagSelected(tag.technologyName) 
                            ? 'bg-emerald-600/20 border-emerald-500 text-emerald-400' 
                            : 'bg-[#0d1117] border-[#30363d] text-gray-400 hover:border-gray-500 hover:text-white'"
                    class="px-3 py-1.5 rounded-full border text-xs font-bold transition-all duration-200">
                    #{{ tag.technologyName }}
                </button>
                } @empty {
                <div class="w-full text-center py-4 text-sm text-gray-500">
                    Nenhuma tag encontrada.
                </div>
                }
            </div>
        </div>

        <div class="p-4 border-t border-[#30363d] flex justify-end bg-[#0d1117]">
            <button type="button" (click)="closeTagModal()"
                class="rounded-lg bg-emerald-600 px-5 py-2.5 text-sm font-medium text-white shadow-sm transition-all hover:bg-emerald-500">
                Pronto
            </button>
        </div>
    </div>

    <!-- Modal Backdrop to close when clicking outside -->
    <form method="dialog" class="modal-backdrop" (click)="closeTagModal()">
    </form>
</dialog>
