<div class="flex justify-center w-full max-w-[940px] mt-6 mb-8">
    <div class="join border border-[#30363d] rounded-md">
        <button
            class="join-item btn bg-[#21262d] border-none text-[#29BC33] hover:bg-[#30363d] disabled:opacity-50 disabled:cursor-not-allowed"
            (click)="onPageChange(currentPage - 1)" [disabled]="isFirst">
            « Anterior
        </button>

        <button class="join-item btn bg-[#21262d] border-none text-[#29BC33] pointer-events-none">
            Página {{ currentPage + 1 }} de {{ totalPages === 0 ? 1 : totalPages }}
        </button>

        <button
            class="join-item btn bg-[#21262d] border-none text-[#29BC33] hover:bg-[#30363d] disabled:opacity-50 disabled:cursor-not-allowed"
            (click)="onPageChange(currentPage + 1)" [disabled]="isLast">
            Próxima »
        </button>
    </div>
</div>
