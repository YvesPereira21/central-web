<article class="w-full max-w-[940px] h-auto container mx-auto my-4 rounded-md bg-[#161B22] text-white shadow-md">
    <!-- profile -->
    <section class="flex gap-4 px-3 py-2 h-[70px]">
        <a [routerLink]="['/profiles', question()?.profile?.profileId]">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
                <div class="w-12 rounded-full">
                    <img alt="Avatar do usuário"
                        src="https://img.daisyui.com/images/profile/demo/yellingcat@192.webp" />
                </div>
            </div>
        </a>
        <div class="flex flex-col gap-1 font-inter">
            <span class="font-semibold">
                {{ question()?.profile?.name }}
            </span>
            <app-level-stage [level]="question()?.profile?.level || ''"></app-level-stage>
        </div>
    </section>

    <section class="px-4 py-2">
        <h1 class="text-[#C9D1D9] text-xl font-inter font-bold">
            {{ question()?.title }}
        </h1>

        <div class="py-1 break-words text-[#8B949E] text-justify leading-relaxed font-lora font-semibold prose prose-invert max-w-none">
            <markdown [data]="question()?.content"></markdown>
        </div>
    </section>

    <section class="px-4">
        <div class="flex flex-wrap gap-2">
            @for (tag of question()?.tags; track tag.technologyName) {
            <div class="px-3 py-1 text-xs font-medium text-gray-400 bg-[#0d1117] border border-[#30363d] rounded-md">
                {{ tag.technologyName }}
            </div>
            }
        </div>
        <hr class="border-[#8B949E] mt-2">
    </section>

    <section class="flex h-[50px] items-center justify-between px-5 py-3">
        <div class="flex items-center gap-5">
            <button (click)="toggleQuestionLike(questionId())" class="group flex items-center gap-1 py-1 transition-all"
                [class.text-emerald-500]="question()?.liked" [class.hover:text-emerald-500]="question()?.liked">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"
                    class="size-6 fill-current transition-transform group-hover:scale-110">
                    <path
                        d="M241 87.1l15 20.7 15-20.7C296 52.5 336.2 32 378.9 32 452.4 32 512 91.6 512 165.1l0 2.6c0 112.2-139.9 242.5-212.9 298.2-12.4 9.4-27.6 14.1-43.1 14.1s-30.8-4.6-43.1-14.1C139.9 410.2 0 279.9 0 167.7l0-2.6C0 91.6 59.6 32 133.1 32 175.8 32 216 52.5 241 87.1z" />
                </svg>
                <span class="text-sm font-medium">{{ question()?.questionTotalLikes }}</span>
            </button>
            <!-- Save button -->
            <button (click)="toggleSave()" class="group flex items-center gap-1 py-1 transition-all"
                [class.text-emerald-500]="question()?.saved" [class.hover:text-emerald-400]="!question()?.saved">
                @if (question()?.saved) {
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"
                    class="size-6 fill-current transition-transform group-hover:scale-110">
                    <path
                        d="M64 0C28.7 0 0 28.7 0 64L0 480c0 11.5 6.2 22.2 16.2 27.8s22.3 5.5 32.2-.4L192 421.3 335.5 507.4c9.9 5.9 22.2 6.1 32.2 .4S384 491.5 384 480l0-416c0-35.3-28.7-64-64-64L64 0z" />
                </svg>
                <span class="text-sm font-medium">Salvo</span>
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"
                    class="size-6 fill-current transition-transform group-hover:scale-110">
                    <path
                        d="M0 48C0 21.5 21.5 0 48 0l0 48V441.4l130.1-92.9c8.3-6 19.6-6 27.9 0L336 441.4V48H48V0H336c26.5 0 48 21.5 48 48V488c0 9-5 17.2-13 21.3s-17.6 3.4-24.9-1.8L192 397.5 37.9 507.5c-7.3 5.2-16.9 5.9-24.9 1.8S0 497 0 488V48z" />
                </svg>
                <span class="text-sm font-medium">Salvar</span>
                }
            </button>
        </div>
    </section>

    <app-collection-modal [isOpen]="isOpen()" [questionId]="questionId()" (closeModal)="isOpen.set(false)" (savedSuccess)="onSaveSuccess()">
    </app-collection-modal>
</article>

<app-answers-question [questionId]="questionId()" [isQuestionOwner]="isQuestionOwner()"></app-answers-question>
