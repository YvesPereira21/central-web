spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:sua_senha_aqui}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
  profiles:
    active: development
  flyway:
    enabled: true
    clean-disabled: true
    baseline-on-migrate: true
    baseline-version: 1
  data:
    redis:
      host: localhost
      port: 6379

file:
  upload-dir: uploads/profiles/

logging:
  level:
    root: info
    io.centralweb.backend: debug
    org:
      springframework:
        security: DEBUG

TOKEN_SECRET: minha-chave-secreta-padrao-desenvolvimento-12345678
api:
  security:
    refresh:
      expiration: 604800000
